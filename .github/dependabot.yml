version: 2

updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:15'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
