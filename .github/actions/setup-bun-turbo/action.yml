name: Setup Bun and Turbo
description: Install Bun dependencies and restore local Bun and Turbo caches.

inputs:
  bun-version:
    description: Bun version to install.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Restore Bun package cache
      uses: actions/cache@v6
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Restore Turbo cache
      uses: actions/cache@v6
      with:
        path: .turbo/cache
        key: ${{ runner.os }}-turbo-${{ github.job }}-${{ hashFiles('bun.lock', 'package.json', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.job }}-${{ hashFiles('bun.lock', 'package.json', 'turbo.json', 'apps/**/package.json', 'packages/**/package.json') }}-
          ${{ runner.os }}-turbo-${{ github.job }}-
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
